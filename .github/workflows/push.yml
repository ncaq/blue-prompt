name: push

on:
  workflow_dispatch:
  push:
    branches: master
  pull_request:

permissions:
  contents: read # リポジトリコンテンツの読み取り

jobs:
  nix-flake-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31
        with:
          # セルフホストランナーでうっかり外部からの悪意あるPRを実行許可してしまい、
          # flake.nixの設定を受け入れると好きなキャッシュを入れられたりしてセキュリティリスクがあるため、
          # GitHubホストランナーでのみflake.nixの設定を自動で受け入れるようにしています。
          extra_nix_config: ${{ runner.environment == 'github-hosted' && 'accept-flake-config = true' || '' }}
      - uses: cachix/cachix-action@2b33705a8232e51ac94414b3b8c203d0a5e42ca3 # v16
        with:
          name: ncaq
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix flake check
