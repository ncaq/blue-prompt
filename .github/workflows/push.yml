name: push

on:
  workflow_dispatch:
  push:
    branches: master
  pull_request:

permissions:
  contents: read # リポジトリコンテンツの読み取り

jobs:
  nix-flake-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31
        with:
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@e7c5c1add25228c774d40ae0adbd520ea7c919c0 # v16
        with:
          name: blue-prompt
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix flake check
